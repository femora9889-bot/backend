services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: femora
      POSTGRES_PASSWORD: femora_pass
      POSTGRES_DB: femora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U femora"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://femora:femora_pass@db:5432/femora
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
