services:
  - type: web
    name: femora-backend
    env: docker
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: femora-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: FIREBASE_CREDENTIALS_PATH
        value: firebase-credentials.json
      - key: GEMINI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false

databases:
  - name: femora-db
    databaseName: femora
    user: femora
